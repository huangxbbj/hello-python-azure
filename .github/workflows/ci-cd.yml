name: CI-CD Docker Azure

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🐍 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🧪 测试
      - name: Install deps + test
        run: |
          pip install -r requirements.txt
          pytest

      # 🐳 Build
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/hello-python:latest .

      # 🔐 登录 ACR（关键修复）
      - name: Docker login
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_NAME }}.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # 🚀 Push
      - name: Push image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/hello-python:latest
