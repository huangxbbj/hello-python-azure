name: CI-CD Docker Azure

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          pip install -r requirements.txt
          pytest

      # 🐳 Docker build
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/hello-python:latest .

      # 🔐 登录 ACR
      - name: Docker login
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_NAME }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # 🚀 Push 镜像
      - name: Push image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/hello-python:latest

