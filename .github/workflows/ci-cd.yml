name: CI-CD

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: pytest --cov=. --cov-fail-under=50

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8A28FD5E35764407A779A8D3DD1008C6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CEAFBF59F0F7402A90A56EA292BFC098 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_64CBDC25B2FA44118AF378EABA159001 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: hello-python-azure
          slot-name: Production
          package: .
